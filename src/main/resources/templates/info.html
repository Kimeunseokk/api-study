<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageName}"></title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 a { text-decoration: none; color: inherit; }
        .info-box { background: #f5f5f5; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
        .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #ddd; }
        .info-row:last-child { border-bottom: none; }
        .info-label { width: 100px; font-weight: bold; color: #555; }
        .edit-section { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        .edit-section h3 { margin-top: 0; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input[type=text], input[type=password], input[type=tel] {
            width: 100%; padding: 8px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 4px; font-size: 15px;
        }
        .hint { font-size: 12px; color: #999; margin-top: 3px; }
        button { padding: 10px 20px; background: #4a90e2; color: white;
                 border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        button:hover { background: #357abd; }
        a.btn-back { display: inline-block; padding: 10px 20px; background: #888;
                     color: white; border-radius: 4px; text-decoration: none; font-size: 15px; margin-left: 8px; }
        a.btn-back:hover { background: #666; }
        .alert-success { background: #d4edda; color: #155724; padding: 10px 14px;
                         border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 10px 14px;
                       border-radius: 4px; margin-bottom: 16px; }
    </style>
</head>
<body>
<h1><a th:href="|/${loginType}/home|">[[${pageName}]]</a></h1>
<hr/>

<!-- 성공/실패 메시지 -->
<div class="alert-success" th:if="${param.success}">회원정보가 성공적으로 수정되었습니다.</div>
<div class="alert-error" th:if="${updateError}" th:text="${updateError}"></div>

<!-- 현재 회원 정보 표시 -->
<div class="info-box">
    <div class="info-row">
        <span class="info-label">아이디</span>
        <span th:text="${user.username}"></span>
    </div>
    <div class="info-row">
        <span class="info-label">이메일</span>
        <span th:text="${user.email}"></span>
    </div>
    <div class="info-row">
        <span class="info-label">닉네임</span>
        <span th:text="${user.nickname}"></span>
    </div>
    <div class="info-row">
        <span class="info-label">전화번호</span>
        <span th:text="${user.phone}"></span>
    </div>
</div>
<!-- 회원정보 수정 폼 -->
<div class="edit-section">
    <h3>회원정보 수정</h3>
    <form th:action="|/${loginType}/info|" th:object="${updateRequest}" method="post">
        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" th:field="*{nickname}" th:placeholder="${user.nickname}"/>
            <div class="hint">변경하지 않으려면 비워두세요.</div>
        </div>
        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="tel" id="phone" th:field="*{phone}" th:placeholder="${user.phone}"/>
            <div class="hint">변경하지 않으려면 비워두세요.</div>
        </div>
        <div class="form-group">
            <label for="password">새 비밀번호</label>
            <input type="password" id="password" th:field="*{password}" placeholder="새 비밀번호"/>
            <div class="hint">변경하지 않으려면 비워두세요.</div>
        </div>
        <div class="form-group">
            <label for="passwordCheck">새 비밀번호 확인</label>
            <input type="password" id="passwordCheck" th:field="*{passwordCheck}" placeholder="새 비밀번호 확인"/>
        </div>
        <button type="submit">수정 완료</button>
        <a th:href="|/${loginType}/home|" class="btn-back">돌아가기</a>
    </form>
</div>

<!-- 회원 탈퇴 -->
<div style="margin-top: 32px; border-top: 1px solid #eee; padding-top: 20px;">
    <form th:action="|/${loginType}/withdraw|" method="post"
          onsubmit="return confirm('정말 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
        <button type="submit" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; font-size:15px;">
            회원 탈퇴
        </button>
    </form>
</div>
</body>
</html>
