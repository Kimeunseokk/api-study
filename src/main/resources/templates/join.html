<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="|${pageName}|"></title>
    <style>
        .error-class { color: red; }
        .error-input { border-color: red; }
    </style>
    <link rel="stylesheet" th:href="@{/css/join.css}" />
    <script th:src="@{/js/join.js}"></script>
</head>
<body>
<div>
    <h1><a th:href="|/${loginType}|">[[${pageName}]]</a></h1> <hr/>
    <h2>회원 가입</h2>

    <form th:method="post" th:action="|@{/{loginType}/join (loginType=${loginType})}|" th:object="${joinRequest}" onsubmit="return validateSignup()">

        <div>
            <label th:for="username">이름 : </label>
            <input type="text" id="username" th:field="*{username}" th:errorclass="error-input"/>
            <div class="error-class" th:errors="*{username}"></div>
        </div>
        <br/>

        <div>
            <label th:for="email">로그인 이메일 : </label>
            <input type="text" id="email" th:field="*{email}" th:errorclass="error-input"/>
            <div class="error-class" th:errors="*{email}"></div>
        </div>
        <br/>

        <div>
            <label th:for="password">비밀번호 : </label>
            <input type="password" id="password" th:field="*{password}" th:errorclass="error-input"/>
            <div class="error-class" th:errors="*{password}"></div>
        </div>
        <br/>

        <div>
            <label th:for="passwordCheck">비밀번호 체크 : </label>
            <input type="password" id="passwordCheck" th:field="*{passwordCheck}" th:errorclass="error-input"/>
            <div class="error-class" th:errors="*{passwordCheck}"></div>
        </div>
        <br/>

        <div>
            <label th:for="nickname">닉네임 : </label>
            <input type="text" id="nickname" th:field="*{nickname}" th:errorclass="error-input"/>
            <div class="error-class" th:errors="*{nickname}"></div>
        </div>
        <br/>

        <div>
            <label th:for="phone">전화번호 : </label>
            <input type="text" id="phone" th:field="*{phone}" th:errorclass="error-input"/>
            <div class="error-class" th:errors="*{phone}"></div>
        </div>
        <br/>

        <button type="submit">회원 가입</button>
    </form>
</div>
</body>
</html>
