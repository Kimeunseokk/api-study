<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageName}">회원가입</title>
    <link rel="stylesheet" th:href="@{/css/join.css}"/>
    <script th:src="@{/js/join.js}" defer></script>
</head>
<body>
<div class="card">
    <div class="logo">🛒 중고마켓</div>
    <div class="subtitle">새 계정을 만들어보세요</div>

    <form th:method="post" th:action="|/${loginType}/join|" th:object="${joinRequest}" onsubmit="return validateSignup()">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" th:field="*{username}" th:errorclass="error-input" placeholder="아이디를 입력하세요"/>
            <div class="error-class" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="text" id="email" th:field="*{email}" th:errorclass="error-input" placeholder="이메일을 입력하세요"/>
            <div class="error-class" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" th:errorclass="error-input" placeholder="비밀번호를 입력하세요"/>
            <div class="error-class" th:errors="*{password}"></div>
        </div>
        <div class="form-group"><label for="passwordCheck">비밀번호 확인</label>
            <input type="password" id="passwordCheck" th:field="*{passwordCheck}" th:errorclass="error-input" placeholder="비밀번호를 다시 입력하세요"/>
            <div class="error-class" th:errors="*{passwordCheck}"></div>
        </div>
        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" th:field="*{nickname}" th:errorclass="error-input" placeholder="닉네임을 입력하세요"/>
            <div class="error-class" th:errors="*{nickname}"></div>
        </div>
        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="tel" id="phone" th:field="*{phone}" th:errorclass="error-input" placeholder="전화번호를 입력하세요"/>
            <div class="error-class" th:errors="*{phone}"></div>
        </div>
        <button class="btn btn-primary" type="submit">회원가입</button>
    </form>

    <div class="bottom-link">
        이미 계정이 있으신가요? <a th:href="|/${loginType}/login|">로그인</a>
    </div>
</div>
</body>
</html>
