<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageName}">로그인</title>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>
<div class="card">
    <div class="logo">🛒 중고마켓</div>
    <div class="subtitle">로그인하고 서비스를 이용하세요</div>

    <div class="error-msg" th:if="${loginError}" th:text="${loginError}"></div>

    <form th:method="post" th:action="|/${loginType}/login|" th:object="${loginRequest}">
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="text" id="email" th:field="*{email}" placeholder="이메일을 입력하세요"/>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" placeholder="비밀번호를 입력하세요"/>
        </div>
        <button class="btn btn-primary" type="submit">로그인</button>
    </form>

    <div class="divider">또는</div>
    <button class="btn btn-outline" onclick="location.href=this.dataset.href" th:data-href="|/${loginType}/join|">
        회원가입
    </button>
</div>
</body>
</html>
